name: CD-AI

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: 307sativa/petomi-ai

jobs:
  build-and-push:
    name: Build and Push AI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push AI Image
        uses: docker/build-push-action@v6
        with:
          context: apps/ai-service
          file: apps/ai-service/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to EC2-AI
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_AI_HOST }}
          username: ${{ secrets.EC2_AI_USER }}
          key: ${{ secrets.EC2_AI_SSH_KEY }}
          script: |
            set -e

            cd ~/petomi-ai

            docker compose pull ai
            docker compose up -d ai

            docker compose ps
            docker logs --tail=80 petomi-ai

            docker image prune -f

            echo "Deploy AI thành công: $(date)"