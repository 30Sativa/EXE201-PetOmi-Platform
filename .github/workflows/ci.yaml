name: CI

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build .NET project
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Show environment info
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Event: ${{ github.event_name }}"

      - name: Restore dependencies
        working-directory: apps/api/PetOmiPlatform
        run: dotnet restore

      - name: Build project
        working-directory: apps/api/PetOmiPlatform
        run: dotnet build --no-restore --configuration Release

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages       # ← dùng lại cache, không download lại
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        working-directory: apps/api/PetOmiPlatform
        run: dotnet restore

      - name: Build project
        working-directory: apps/api/PetOmiPlatform
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        working-directory: apps/api/PetOmiPlatform
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/api/PetOmiPlatform/Dockerfile

      - name: Docker build check
        working-directory: apps/api/PetOmiPlatform
        run: docker build -t dummy-image -f Dockerfile .