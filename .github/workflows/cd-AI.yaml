name: CD-AI

on:
  push:
    branches:
      - main
    paths:
      - "apps/ai-service/**"
      - ".github/workflows/cd-AI.yaml"
  workflow_dispatch:

env:
  AI_SERVICE_IMAGE_NAME: 307sativa/petomi-ai-service

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push AI Service Image
        uses: docker/build-push-action@v6
        with:
          context: apps/ai-service
          file: apps/ai-service/Dockerfile
          push: true
          tags: |
            ${{ env.AI_SERVICE_IMAGE_NAME }}:latest
            ${{ env.AI_SERVICE_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.AI_SERVICE_IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.AI_SERVICE_IMAGE_NAME }}:cache,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/petomi

            docker compose pull ai-service
            docker compose up -d ai-service

            docker compose ps ai-service
            docker logs --tail=80 petomi-ai-service

            docker image prune -f

            echo "Deploy thanh cong: $(date)"
