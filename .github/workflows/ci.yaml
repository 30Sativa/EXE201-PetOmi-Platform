name: CI

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"

  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Build, Test, Docker check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show project structure
        run: |
          echo "============Project structure============"
          pwd
          ls -la
          echo "========================================"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Show .NET info
        run: dotnet --info

      - name: Restore dependencies
        working-directory: apps/api/PetOmiPlatform
        run: |
          echo "========== RESTORE START =========="
          dotnet restore
          echo "========== RESTORE DONE =========="

      - name: Build project
        working-directory: apps/api/PetOmiPlatform
        run: |
          echo "========== BUILD START =========="
          dotnet build --no-restore --configuration Release
          echo "========== BUILD DONE =========="

      - name: Run tests
        working-directory: apps/api/PetOmiPlatform
        run: |
          echo "========== TEST START =========="
          dotnet test --no-build --configuration Release
          echo "========== TEST DONE =========="

      - name: Docker build check
        working-directory: apps/api/PetOmiPlatform
        run: |
          echo "========== DOCKER BUILD START =========="
          if [ ! -f Dockerfile ]; then
            echo "Dockerfile not found"
            exit 1
          fi

          docker build -t dummy-image -f Dockerfile .
          echo "========== DOCKER BUILD DONE =========="